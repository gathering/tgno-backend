{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frontend preview</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      .frame {
        border: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <iframe
      class="frame"
      src="{{ frontend_preview_base_url }}/news/{{ slug|urlencode }}?token={{ token|urlencode }}"
      title="Frontend preview"
    ></iframe>
  </body>
</html>
